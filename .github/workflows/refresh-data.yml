name: Refresh performance data

on:
  schedule:
    - cron: '0 7 * * *'   # 8am UK
    - cron: '0 11 * * *'  # 12pm UK
    - cron: '0 15 * * *'  # 4pm UK
    - cron: '30 17 * * *' # 6:30pm UK
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch performance data
        run: node fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add performances.json
          git diff --staged --quiet || git commit -m "Auto-refresh performances data $(date -u '+%Y-%m-%d %H:%M')"
          git push
